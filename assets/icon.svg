<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- 主背景渐变：左上亮红 → 右下深红 -->
    <linearGradient id="bg" x1="15%" y1="0%" x2="85%" y2="100%">
      <stop offset="0%" stop-color="#FF6058"/>
      <stop offset="100%" stop-color="#C0281C"/>
    </linearGradient>
    <!-- 顶部光泽 -->
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- 漏斗内部阴影，增加立体感 -->
    <linearGradient id="funnel-shade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.82"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- 背景圆角方块 -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- 顶部光泽层 -->
  <rect width="1024" height="540" rx="220" ry="220" fill="url(#shine)"/>

  <!-- 漏斗主体 -->
  <g filter="url(#shadow)">
    <path fill="url(#funnel-shade)"
      d="
        M 196 192
        C 196 174 211 160 229 160
        L 795 160
        C 813 160 828 174 828 192
        L 828 256
        C 828 268 821 280 810 286
        L 590 482
        C 585 486 582 492 582 499
        L 582 792
        C 582 810 567 824 549 824
        L 475 824
        C 457 824 442 810 442 792
        L 442 499
        C 442 492 439 486 434 482
        L 214 286
        C 203 280 196 268 196 256
        Z
      "
    />
  </g>

  <!-- 漏斗顶部高光描边，增加分界感 -->
  <path fill="none" stroke="white" stroke-width="6" stroke-opacity="0.35"
    d="
      M 196 192
      C 196 174 211 160 229 160
      L 795 160
      C 813 160 828 174 828 192
      L 828 256
      C 828 268 821 280 810 286
      L 590 482
      C 585 486 582 492 582 499
      L 582 792
      C 582 810 567 824 549 824
      L 475 824
      C 457 824 442 810 442 792
      L 442 499
      C 442 492 439 486 434 482
      L 214 286
      C 203 280 196 268 196 256
      Z
    "
  />

  <!-- 漏斗出口处：三个小圆点，代表任务流向三个方向（行动/项目/等待） -->
  <circle cx="512" cy="900" r="22" fill="white" opacity="0.90"/>
  <circle cx="420" cy="895" r="14" fill="white" opacity="0.55"/>
  <circle cx="604" cy="895" r="14" fill="white" opacity="0.55"/>
</svg>
